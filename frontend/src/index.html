<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VeeraBank — Private Banking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1120; --panel:#111b30; --panel-2:#16223c; --line:#243252;
    --paper:#f4f1ea;
    --text:#eef1f8; --muted:#8b96b3; --muted-2:#5c6788;
    --ledger:#1f9d6c; --ledger-dim:#163f31;
    --gold:#c9a24b; --gold-dim:#3a3020;
    --danger:#e8695f; --danger-dim:#3a201d;
    --radius:14px;
    --display:'Fraunces', serif;
    --sans:'Inter', system-ui, sans-serif;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, #14213f 0%, transparent 60%),
      radial-gradient(ellipse 900px 500px at 110% 10%, #12291f 0%, transparent 55%),
      var(--ink);
    color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--ledger); color:#06140f;}
  a{color:inherit;}
  button{font-family:inherit;}

  /* ---------- App shell ---------- */
  .shell{display:grid; grid-template-columns:248px 1fr; min-height:100vh;}
  @media (max-width:880px){ .shell{grid-template-columns:1fr;} .sidebar{position:sticky; top:0; z-index:20;} }

  .sidebar{
    background:linear-gradient(180deg, var(--panel), var(--ink) 140%);
    border-right:1px solid var(--line);
    padding:28px 20px; display:flex; flex-direction:column; gap:28px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{
    width:34px; height:34px; border-radius:9px; flex:none;
    background:conic-gradient(from 210deg, var(--ledger), var(--gold), var(--ledger));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-weight:600; color:#06140f; font-size:15px;
  }
  .brand .word{font-family:var(--display); font-size:19px; letter-spacing:.2px;}
  .brand .word b{color:var(--ledger); font-weight:600;}

  .navgroup{display:flex; flex-direction:column; gap:2px;}
  .navgroup .label{font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted-2); margin:14px 4px 6px;}
  .navitem{
    display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:10px;
    color:var(--muted); font-size:13.5px; font-weight:500; cursor:pointer; border:1px solid transparent;
    background:none; text-align:left; width:100%;
  }
  .navitem svg{width:16px; height:16px; flex:none; opacity:.85;}
  .navitem:hover{color:var(--text); background:var(--panel-2);}
  .navitem.active{color:var(--text); background:var(--panel-2); border-color:var(--line); box-shadow:inset 2px 0 0 var(--ledger);}

  .sidebar-foot{margin-top:auto; padding-top:16px; border-top:1px solid var(--line);}
  .who{display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px;}
  .who .avatar{width:32px; height:32px; border-radius:50%; background:var(--gold-dim); color:var(--gold); display:flex; align-items:center; justify-content:center; font-family:var(--display); font-size:13px; flex:none;}
  .who .meta{overflow:hidden;}
  .who .meta .name{font-size:12.5px; font-weight:600; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;}
  .who .meta .sub{font-size:11px; color:var(--muted-2); white-space:nowrap; text-overflow:ellipsis; overflow:hidden;}
  .signout{margin-top:8px; font-size:11.5px; color:var(--muted-2); background:none; border:none; cursor:pointer; padding:6px 8px;}
  .signout:hover{color:var(--danger);}

  /* ---------- Main ---------- */
  main{padding:30px 40px 60px; max-width:1180px; width:100%; margin:0 auto;}
  @media (max-width:640px){ main{padding:20px;} }

  .topline{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:26px;}
  .eyebrow{font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--ledger);}
  .pagetitle{font-family:var(--display); font-size:30px; font-weight:500; margin:4px 0 0;}
  .clock{font-family:var(--mono); font-size:12px; color:var(--muted-2);}

  .grid{display:grid; gap:18px;}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-2{grid-template-columns:1.3fr 1fr;}
  @media (max-width:880px){ .grid.cols-3{grid-template-columns:1fr;} .grid.cols-2{grid-template-columns:1fr;} }

  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius); padding:22px;
    position:relative; overflow:hidden;
  }
  .card h2{font-family:var(--display); font-weight:500; font-size:16.5px; margin:0 0 4px;}
  .card .hint{font-size:12px; color:var(--muted-2); margin:0 0 16px;}

  /* hero balance card */
  .hero{
    grid-column:1/-1; padding:30px 30px 20px;
    background:
      radial-gradient(500px 200px at 90% -20%, rgba(201,162,75,.16), transparent 60%),
      linear-gradient(180deg, var(--panel), var(--panel-2));
  }
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:18px;}
  .hero-label{font-size:11px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted-2);}
  .hero-amount{font-family:var(--display); font-size:52px; font-weight:500; margin:6px 0 0; letter-spacing:-.5px;}
  .hero-amount .cur{font-size:26px; color:var(--muted); margin-right:4px; font-weight:400;}
  .hero-sub{font-size:12.5px; color:var(--muted); margin-top:6px;}
  .hero-sub .up{color:var(--ledger); font-weight:600;}
  .hero-actions{display:flex; gap:10px; flex-wrap:wrap;}

  .sparkline{margin-top:18px; height:64px; display:flex; align-items:flex-end; gap:4px;}
  .sparkline i{flex:1; background:linear-gradient(180deg, var(--ledger), var(--ledger-dim)); border-radius:3px 3px 0 0; min-height:3px; opacity:.85; transition:opacity .15s;}
  .sparkline i.neg{background:linear-gradient(180deg, var(--danger), var(--danger-dim));}
  .sparkline i:hover{opacity:1;}

  /* form fields */
  label{display:block; font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:var(--muted-2); margin-top:14px; margin-bottom:6px;}
  input, select{
    width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
    background:var(--ink); color:var(--text); font-family:var(--sans); font-size:13.5px;
  }
  input:focus, select:focus{outline:2px solid var(--ledger); outline-offset:1px; border-color:var(--ledger);}
  input::placeholder{color:var(--muted-2);}

  .btn{
    margin-top:18px; background:var(--ledger); color:#06140f; border:none; padding:11px 18px;
    border-radius:9px; font-weight:600; font-size:13px; cursor:pointer; letter-spacing:.2px;
    transition:transform .1s, filter .15s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent; color:var(--text); border:1px solid var(--line);}
  .btn.ghost:hover{border-color:var(--ledger); color:var(--ledger);}
  .btn.gold{background:var(--gold); color:#241d09;}
  .btn.sm{padding:8px 13px; font-size:12px; margin-top:0;}

  .msg{margin-top:12px; font-size:12.5px; padding:9px 12px; border-radius:8px; display:flex; align-items:center; gap:8px;}
  .msg.ok{background:var(--ledger-dim); color:#7fe6b8;}
  .msg.err{background:var(--danger-dim); color:#f6a19b;}

  .pill{display:inline-flex; align-items:center; gap:6px; background:var(--panel-2); border:1px solid var(--line); padding:5px 11px; border-radius:20px; font-size:11.5px; color:var(--muted);}
  .pill .dot{width:6px; height:6px; border-radius:50%; background:var(--muted-2);}
  .pill.on .dot{background:var(--ledger); box-shadow:0 0 6px var(--ledger);}

  /* ledger table - signature element */
  .ledger{width:100%; border-collapse:collapse; margin-top:6px; font-size:13px;}
  .ledger thead th{
    text-align:left; font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted-2);
    padding:8px 10px; border-bottom:1px solid var(--line); font-weight:600;
  }
  .ledger tbody tr{border-bottom:1px solid var(--line);}
  .ledger tbody tr:hover{background:var(--panel-2);}
  .ledger td{padding:10px; vertical-align:middle;}
  .ledger .tcell{display:flex; align-items:center; gap:8px;}
  .ledger .tick{width:3px; height:22px; border-radius:2px; background:var(--ledger); flex:none;}
  .ledger .tick.neg{background:var(--danger);}
  .ledger .amt{font-family:var(--mono);}
  .ledger .amt.pos{color:var(--ledger);}
  .ledger .amt.neg{color:var(--danger);}
  .ledger .idcell{font-family:var(--mono); color:var(--muted); font-size:11.5px;}
  .ledger .when{color:var(--muted-2); font-size:11.5px; font-family:var(--mono);}

  .empty{padding:28px 10px; text-align:center; color:var(--muted-2); font-size:12.5px;}
  .empty .big{font-family:var(--display); font-size:15px; color:var(--muted); margin-bottom:4px;}

  .badge{display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:.6px; padding:3px 8px; border-radius:5px; background:var(--panel-2); border:1px solid var(--line); color:var(--muted);}

  .split{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}

  .section-title{font-family:var(--display); font-size:20px; font-weight:500; margin:36px 0 14px;}

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}

  .toast-wrap{position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:100;}
  .toast{background:var(--panel-2); border:1px solid var(--line); border-left:3px solid var(--ledger); padding:12px 16px; border-radius:9px; font-size:12.5px; box-shadow:0 10px 30px rgba(0,0,0,.4); animation:slideIn .25s ease both;}
  .toast.err{border-left-color:var(--danger);}
  @keyframes slideIn{from{opacity:0; transform:translateX(16px);} to{opacity:1; transform:none;}}

  .gate{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .gate-card{width:100%; max-width:920px; display:grid; grid-template-columns:1.1fr 1fr; border-radius:20px; overflow:hidden; border:1px solid var(--line); background:var(--panel);}
  @media (max-width:760px){ .gate-card{grid-template-columns:1fr;} .gate-visual{display:none;} }
  .gate-visual{
    background:
      radial-gradient(500px 300px at 20% 0%, rgba(31,157,108,.25), transparent 60%),
      radial-gradient(400px 300px at 100% 100%, rgba(201,162,75,.2), transparent 60%),
      linear-gradient(160deg, #0d1830, #0a1120);
    padding:40px; display:flex; flex-direction:column; justify-content:space-between;
  }
  .gate-visual .quote{font-family:var(--display); font-size:22px; line-height:1.4; margin-top:40px;}
  .gate-visual .quote span{color:var(--ledger);}
  .gate-visual .foot{font-size:11px; color:var(--muted-2); letter-spacing:.5px;}
  .gate-form{padding:38px 40px;}
  .tabs{display:flex; gap:4px; background:var(--ink); border:1px solid var(--line); border-radius:10px; padding:3px; margin-top:18px;}
  .tabs button{flex:1; padding:8px; border-radius:8px; border:none; background:none; color:var(--muted); font-size:12.5px; font-weight:600; cursor:pointer;}
  .tabs button.active{background:var(--panel-2); color:var(--text);}
</style>
</head>
<body>

<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>

<script>
/* =========================================================================
   Config — each microservice is reached via its own ingress path prefix.
   ========================================================================= */
const GENERIC_SERVICES = [
  "transfers","cards","loans","payments","beneficiaries","statements",
  "notifications","kyc","fixed-deposits","cheques","disputes",
  "audit-log","fraud-detection","support-tickets","rewards","admin","reports"
];
const SERVICE_ICONS = {
  transfers:"↔", cards:"▭", loans:"⌘", payments:"◈", beneficiaries:"◎",
  statements:"▤", notifications:"◔", kyc:"✓", "fixed-deposits":"◒",
  cheques:"▥", disputes:"!", "audit-log":"≡", "fraud-detection":"◭",
  "support-tickets":"?", rewards:"★", admin:"⚙", reports:"▦"
};

let currentUser = JSON.parse(localStorage.getItem("veera_user") || "null");
let currentTab = "dashboard";
let authTab = "login";
let cachedAccounts = [];

/* ---------------------------------------------------------------------- */
async function api(path, opts = {}) {
  const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.detail || res.statusText || "Request failed");
  return body;
}
function toast(text, ok = true) {
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast" + (ok ? "" : " err");
  el.textContent = text;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 4200);
}
function fmtMoney(n) {
  const v = Number(n || 0);
  return v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtWhen(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleString(undefined, { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
}
function initials(name) {
  return (name || "?").trim().split(/\s+/).slice(0,2).map(w => w[0]?.toUpperCase() || "").join("");
}
function setUser(u) {
  currentUser = u;
  if (u) localStorage.setItem("veera_user", JSON.stringify(u));
  else localStorage.removeItem("veera_user");
}

/* ---------------------------------------------------------------------- */
const ICONS = {
  dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="10" width="8" height="11" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/></svg>',
  accounts:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2.5" y="6" width="19" height="13" rx="2"/><path d="M2.5 10h19"/><path d="M6 15h4"/></svg>',
  transactions:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7h13l-3-3M20 17H7l3 3"/></svg>',
  services:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
};
function iconFor(key){ return ICONS[key] || ICONS.services; }

function renderShell(bodyHtml) {
  document.getElementById("app").innerHTML = `
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">V</div>
          <div class="word">Veera<b>Bank</b></div>
        </div>
        <nav class="navgroup" id="nav-primary">
          <div class="label">Overview</div>
        </nav>
        <nav class="navgroup" id="nav-secondary"></nav>
        <div class="sidebar-foot">
          <div class="who">
            <div class="avatar">${initials(currentUser.full_name)}</div>
            <div class="meta">
              <div class="name">${currentUser.full_name}</div>
              <div class="sub">${currentUser.email}</div>
            </div>
          </div>
          <button class="signout" onclick="doLogout()">Sign out →</button>
        </div>
      </aside>
      <main id="main"></main>
    </div>
  `;
  renderNav();
}

function renderNav() {
  const primary = document.getElementById("nav-primary");
  const secondary = document.getElementById("nav-secondary");
  const mk = (key, label, icon) => {
    const b = document.createElement("button");
    b.className = "navitem" + (key === currentTab ? " active" : "");
    b.innerHTML = `${icon}<span>${label}</span>`;
    b.onclick = () => { currentTab = key; render(); };
    return b;
  };
  primary.innerHTML = `<div class="label">Overview</div>`;
  [["dashboard","Dashboard",iconFor("dashboard")], ["accounts","Accounts",iconFor("accounts")],
   ["transactions","Transactions",iconFor("transactions")]].forEach(([k,l,i]) => primary.appendChild(mk(k,l,i)));

  secondary.innerHTML = `<div class="label">Services</div>`;
  const b = document.createElement("button");
  b.className = "navitem" + (currentTab === "services" ? " active" : "");
  b.innerHTML = `${iconFor("services")}<span>All services (17)</span>`;
  b.onclick = () => { currentTab = "services"; render(); };
  secondary.appendChild(b);
}

/* ---------------------------------------------------------------------- */
function renderGate() {
  document.getElementById("app").innerHTML = `
    <div class="gate">
      <div class="gate-card fade-in">
        <div class="gate-visual">
          <div class="brand">
            <div class="mark">V</div>
            <div class="word" style="color:#eef1f8">Veera<b>Bank</b></div>
          </div>
          <div>
            <div class="quote">Every balance is <span>a ledger</span>, every transfer <span>a promise kept</span>.</div>
            <div class="foot" style="margin-top:22px;">SECURE · CLOUD-NATIVE · 20 SERVICES ON EKS</div>
          </div>
        </div>
        <div class="gate-form">
          <div class="eyebrow">Welcome back</div>
          <div class="pagetitle" style="font-size:24px;">Sign in to VeeraBank</div>
          <div class="tabs">
            <button class="${authTab==='login'?'active':''}" onclick="setAuthTab('login')">Login</button>
            <button class="${authTab==='register'?'active':''}" onclick="setAuthTab('register')">Register</button>
          </div>
          <div id="auth-body"></div>
        </div>
      </div>
    </div>
  `;
  renderAuthBody();
}
function setAuthTab(t){ authTab = t; renderGate(); }

function renderAuthBody() {
  const el = document.getElementById("auth-body");
  if (authTab === "login") {
    el.innerHTML = `
      <label>Email</label><input id="l_email" type="email" placeholder="you@veerabank.com" />
      <label>Password</label><input id="l_password" type="password" placeholder="••••••••" />
      <button class="btn" style="width:100%" onclick="doLogin()">Sign in</button>
      <div id="l_msg"></div>
    `;
  } else {
    el.innerHTML = `
      <label>Full name</label><input id="r_name" placeholder="Ada Lovelace" />
      <label>Email</label><input id="r_email" type="email" placeholder="you@veerabank.com" />
      <label>Phone</label><input id="r_phone" placeholder="+1 555 000 1234" />
      <label>Password</label><input id="r_password" type="password" placeholder="Create a password" />
      <button class="btn gold" style="width:100%" onclick="doRegister()">Create account</button>
      <div id="r_msg"></div>
    `;
  }
}

async function doRegister() {
  const el = document.getElementById("r_msg");
  try {
    const body = {
      full_name: document.getElementById("r_name").value,
      email: document.getElementById("r_email").value,
      phone: document.getElementById("r_phone").value,
      password: document.getElementById("r_password").value,
    };
    const user = await api("/users/register", { method: "POST", body: JSON.stringify(body) });
    setUser(user);
    toast("Account created — welcome to VeeraBank.");
    currentTab = "dashboard";
    render();
  } catch (e) { el.innerHTML = `<div class="msg err">${e.message}</div>`; }
}
async function doLogin() {
  const el = document.getElementById("l_msg");
  try {
    const body = {
      email: document.getElementById("l_email").value,
      password: document.getElementById("l_password").value,
    };
    const user = await api("/users/login", { method: "POST", body: JSON.stringify(body) });
    setUser(user);
    toast(`Welcome back, ${user.full_name.split(" ")[0]}.`);
    currentTab = "dashboard";
    render();
  } catch (e) { el.innerHTML = `<div class="msg err">${e.message}</div>`; }
}
function doLogout(){ setUser(null); render(); }

/* ---------------------------------------------------------------------- */
function pageHeader(eyebrow, title) {
  return `
    <div class="topline">
      <div>
        <div class="eyebrow">${eyebrow}</div>
        <div class="pagetitle">${title}</div>
      </div>
      <div class="clock" id="clock"></div>
    </div>
  `;
}
function tickClock() {
  const el = document.getElementById("clock");
  if (!el) return;
  el.textContent = new Date().toLocaleString(undefined, { weekday:"short", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit", second:"2-digit" });
}
setInterval(tickClock, 1000);

/* ---------------- Dashboard ---------------- */
async function renderDashboard() {
  const main = document.getElementById("main");
  main.innerHTML = pageHeader("Overview", "Good to see you") + `
    <div class="grid" id="dash-grid">
      <div class="card hero fade-in">
        <div class="hero-top">
          <div>
            <div class="hero-label">Total balance across accounts</div>
            <div class="hero-amount"><span class="cur">$</span><span id="hero-total">0.00</span></div>
            <div class="hero-sub"><span id="hero-accounts-count">0</span> accounts open · <span class="up" id="hero-txn-count">0 transactions</span></div>
          </div>
          <div class="hero-actions">
            <button class="btn ghost sm" onclick="currentTab='accounts'; render();">Open account</button>
            <button class="btn sm" onclick="currentTab='transactions'; render();">New transaction</button>
          </div>
        </div>
        <div class="sparkline" id="sparkline"></div>
      </div>
    </div>
    <div class="grid cols-2" style="margin-top:18px;">
      <div class="card fade-in">
        <h2>Recent activity</h2>
        <p class="hint">Latest movement across every account, newest first.</p>
        <div id="recent-ledger"><div class="empty">Loading…</div></div>
      </div>
      <div class="card fade-in">
        <h2>Your accounts</h2>
        <p class="hint">Balances update the moment a transaction posts.</p>
        <div id="dash-accounts"><div class="empty">Loading…</div></div>
      </div>
    </div>
  `;

  try {
    const accounts = await api("/accounts");
    cachedAccounts = accounts;
    const total = accounts.reduce((s,a) => s + Number(a.balance || 0), 0);
    animateCount(document.getElementById("hero-total"), total);
    document.getElementById("hero-accounts-count").textContent = accounts.length;

    document.getElementById("dash-accounts").innerHTML = accounts.length ? accounts.slice(0,6).map(a => `
      <div class="split" style="justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line);">
        <div>
          <div style="font-size:13px; font-weight:600;">${a.owner_name}</div>
          <div class="badge">${a.account_type}</div>
        </div>
        <div class="amt" style="font-family:var(--mono); font-size:14px;">$${fmtMoney(a.balance)}</div>
      </div>
    `).join("") : `<div class="empty"><div class="big">No accounts yet</div>Open your first account to get started.</div>`;

    // pull recent transactions across up to 4 accounts for the sparkline/ledger
    let all = [];
    for (const a of accounts.slice(0,4)) {
      try { const t = await api(`/transactions/${a.account_id}`); all = all.concat(t.map(x => ({...x, owner: a.owner_name}))); } catch (e) {}
    }
    all.sort((a,b) => (b.created_at || "").localeCompare(a.created_at || ""));
    document.getElementById("hero-txn-count").textContent = `${all.length} transactions`;

    const spark = document.getElementById("sparkline");
    const recent = all.slice(0,28).reverse();
    if (recent.length) {
      const max = Math.max(...recent.map(t => Number(t.amount)), 1);
      spark.innerHTML = recent.map(t => {
        const h = Math.max(6, Math.round((Number(t.amount)/max)*64));
        return `<i class="${t.type==='withdrawal'?'neg':''}" style="height:${h}px" title="${t.type} $${fmtMoney(t.amount)}"></i>`;
      }).join("");
    } else {
      spark.innerHTML = `<div class="empty" style="width:100%">No transactions yet — activity will chart here.</div>`;
    }

    document.getElementById("recent-ledger").innerHTML = renderLedgerTable(all.slice(0,8), true);
  } catch (e) {
    toast(e.message, false);
  }
}

function animateCount(el, target) {
  const start = 0, dur = 700, t0 = performance.now();
  function step(t) {
    const p = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = fmtMoney(start + (target - start) * eased);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderLedgerTable(rows, showOwner) {
  if (!rows.length) return `<div class="empty"><div class="big">Nothing here yet</div>Transactions will appear as soon as they post.</div>`;
  return `
    <table class="ledger">
      <thead><tr><th>Transaction</th>${showOwner ? "<th>Account</th>" : ""}<th>Amount</th><th>Balance after</th><th>When</th></tr></thead>
      <tbody>
        ${rows.map(t => `
          <tr>
            <td><div class="tcell"><div class="tick ${t.type==='withdrawal'?'neg':''}"></div><div><div style="font-weight:600; font-size:12.5px; text-transform:capitalize;">${t.type}</div><div class="idcell">${(t.transaction_id||'').slice(0,8)}</div></div></div></td>
            ${showOwner ? `<td>${t.owner || ''}</td>` : ""}
            <td class="amt ${t.type==='withdrawal'?'neg':'pos'}">${t.type==='withdrawal'?'−':'+'}$${fmtMoney(t.amount)}</td>
            <td class="amt">$${fmtMoney(t.balance_after)}</td>
            <td class="when">${fmtWhen(t.created_at)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

/* ---------------- Accounts ---------------- */
async function renderAccounts() {
  const main = document.getElementById("main");
  main.innerHTML = pageHeader("Accounts", "Manage accounts") + `
    <div class="grid cols-2">
      <div class="card fade-in">
        <h2>Open a new account</h2>
        <p class="hint">Savings or current, funded immediately with an opening balance.</p>
        <label>Owner name</label><input id="a_owner" value="${currentUser ? currentUser.full_name : ''}" />
        <label>Account type</label>
        <select id="a_type"><option value="savings">Savings</option><option value="current">Current</option></select>
        <label>Opening balance</label><input id="a_balance" type="number" min="0" step="0.01" value="0" />
        <button class="btn" onclick="doCreateAccount()">Open account</button>
        <div id="a_msg"></div>
      </div>
      <div class="card fade-in">
        <h2>All accounts</h2>
        <p class="hint">Click an ID to copy it for transfers and transactions.</p>
        <div id="a_list"><div class="empty">Loading…</div></div>
      </div>
    </div>
  `;
  loadAccounts();
}
async function doCreateAccount() {
  const el = document.getElementById("a_msg");
  try {
    const body = {
      owner_name: document.getElementById("a_owner").value,
      account_type: document.getElementById("a_type").value,
      opening_balance: Number(document.getElementById("a_balance").value || 0),
    };
    await api("/accounts", { method: "POST", body: JSON.stringify(body) });
    el.innerHTML = `<div class="msg ok">Account opened.</div>`;
    toast("Account opened.");
    loadAccounts();
  } catch (e) { el.innerHTML = `<div class="msg err">${e.message}</div>`; }
}
async function loadAccounts() {
  try {
    const accounts = await api("/accounts");
    cachedAccounts = accounts;
    const list = document.getElementById("a_list");
    list.innerHTML = accounts.length ? accounts.map(a => `
      <div class="split" style="justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--line);">
        <div>
          <div class="idcell" style="cursor:pointer;" onclick="navigator.clipboard.writeText('${a.account_id}'); toast('Account ID copied.')">${a.account_id.slice(0,13)}…</div>
          <div style="font-size:13px; font-weight:600; margin-top:2px;">${a.owner_name} <span class="badge">${a.account_type}</span></div>
        </div>
        <div class="amt" style="font-family:var(--mono); font-size:15px;">$${fmtMoney(a.balance)}</div>
      </div>
    `).join("") : `<div class="empty"><div class="big">No accounts yet</div>Use the form to open your first one.</div>`;
  } catch (e) { toast(e.message, false); }
}

/* ---------------- Transactions ---------------- */
async function renderTransactions() {
  const main = document.getElementById("main");
  const opts = cachedAccounts.map(a => `<option value="${a.account_id}">${a.owner_name} — ${a.account_id.slice(0,8)}… ($${fmtMoney(a.balance)})</option>`).join("");
  main.innerHTML = pageHeader("Transactions", "Move money") + `
    <div class="grid cols-2">
      <div class="card fade-in">
        <h2>New transaction</h2>
        <p class="hint">Posted instantly; balances update atomically. History is durably stored in S3.</p>
        <label>Account</label>
        <select id="t_account">${opts || '<option value="">No accounts yet — open one first</option>'}</select>
        <label>Type</label>
        <select id="t_type"><option value="deposit">Deposit</option><option value="withdrawal">Withdrawal</option></select>
        <label>Amount</label><input id="t_amount" type="number" min="0.01" step="0.01" placeholder="0.00" />
        <button class="btn" onclick="doTransaction()">Submit transaction</button>
        <div id="t_msg"></div>
      </div>
      <div class="card fade-in">
        <h2>Look up history</h2>
        <p class="hint">Pull the full ledger for any account, read straight from S3.</p>
        <label>Account</label>
        <select id="t_lookup">${opts || '<option value="">No accounts yet</option>'}</select>
        <button class="btn ghost" onclick="loadTransactions()">Load history</button>
        <div id="t_history" style="margin-top:10px;"></div>
      </div>
    </div>
  `;
  if (cachedAccounts.length) loadTransactions();
}
async function doTransaction() {
  const el = document.getElementById("t_msg");
  try {
    const body = {
      account_id: document.getElementById("t_account").value,
      type: document.getElementById("t_type").value,
      amount: Number(document.getElementById("t_amount").value),
    };
    if (!body.account_id) throw new Error("Open an account first.");
    await api("/transactions", { method: "POST", body: JSON.stringify(body) });
    el.innerHTML = `<div class="msg ok">Transaction posted.</div>`;
    toast("Transaction posted.");
    loadTransactions();
  } catch (e) { el.innerHTML = `<div class="msg err">${e.message}</div>`; }
}
async function loadTransactions() {
  const id = document.getElementById("t_lookup").value;
  const box = document.getElementById("t_history");
  if (!id) { box.innerHTML = `<div class="empty">Select an account.</div>`; return; }
  box.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const txns = await api(`/transactions/${id}`);
    box.innerHTML = renderLedgerTable(txns, false);
  } catch (e) { box.innerHTML = `<div class="empty">${e.message}</div>`; }
}

/* ---------------- Other services ---------------- */
function renderServices() {
  const main = document.getElementById("main");
  main.innerHTML = pageHeader("Platform", "All services") + `
    <div class="grid cols-3" id="svc-tiles">
      ${GENERIC_SERVICES.map(s => `
        <button class="card fade-in" style="text-align:left; cursor:pointer; border:1px solid var(--line);" onclick="openService('${s}')">
          <div style="font-size:20px; color:var(--gold);">${SERVICE_ICONS[s] || "◆"}</div>
          <h2 style="text-transform:capitalize; margin-top:10px;">${s.replace('-',' ')}</h2>
          <p class="hint" style="margin:0;">Generic CRUD microservice</p>
        </button>
      `).join("")}
    </div>
    <div id="svc-detail"></div>
  `;
}
function openService(svc) {
  const el = document.getElementById("svc-detail");
  el.innerHTML = `
    <div class="section-title" style="text-transform:capitalize;">${svc.replace('-',' ')}</div>
    <div class="grid cols-2">
      <div class="card fade-in">
        <h2>Create item</h2>
        <p class="hint">Any JSON shape is accepted by this service.</p>
        <label>Item JSON</label>
        <input id="s_json" value='{"note": "example"}' />
        <button class="btn" onclick="doCreateGeneric('${svc}')">Create</button>
        <div id="s_msg"></div>
      </div>
      <div class="card fade-in">
        <h2>Items</h2>
        <button class="btn ghost sm" onclick="loadGeneric('${svc}')">Refresh</button>
        <div id="s_list" style="margin-top:12px;"></div>
      </div>
    </div>
  `;
  loadGeneric(svc);
}
async function doCreateGeneric(svc) {
  const el = document.getElementById("s_msg");
  try {
    const data = JSON.parse(document.getElementById("s_json").value);
    await api(`/${svc}/items`, { method: "POST", body: JSON.stringify(data) });
    el.innerHTML = `<div class="msg ok">Created.</div>`;
    toast("Item created.");
    loadGeneric(svc);
  } catch (e) { el.innerHTML = `<div class="msg err">${e.message}</div>`; }
}
async function loadGeneric(svc) {
  const box = document.getElementById("s_list");
  box.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const items = await api(`/${svc}/items`);
    box.innerHTML = items.length ? items.map(i => `
      <div style="padding:9px 0; border-bottom:1px solid var(--line);">
        <div class="idcell">${(i.id||'').slice(0,8)}…</div>
        <div style="font-size:12px; color:var(--muted); margin-top:2px; word-break:break-all;">${JSON.stringify(i)}</div>
      </div>
    `).join("") : `<div class="empty"><div class="big">No items yet</div>Create one to see it here.</div>`;
  } catch (e) { box.innerHTML = `<div class="empty">${e.message}</div>`; }
}

/* ---------------------------------------------------------------------- */
async function render() {
  if (!currentUser) { renderGate(); return; }
  renderShell();
  if (currentTab === "dashboard") await renderDashboard();
  else if (currentTab === "accounts") await renderAccounts();
  else if (currentTab === "transactions") await renderTransactions();
  else if (currentTab === "services") renderServices();
  tickClock();
}

render();
</script>
