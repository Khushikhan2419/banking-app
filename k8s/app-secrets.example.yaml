# EXAMPLE ONLY - do not fill in real values and do not `kubectl apply` this
# file as-is in production.
#
# In production, this Secret is created/updated automatically by
# .github/workflows/deploy.yml, which reads the real values from a GitHub
# Environment's encrypted secrets (Settings -> Environments -> production)
# and runs `kubectl create secret generic app-secrets --dry-run=client
# -o yaml | kubectl apply -f -` on every deploy. The values never touch
# the repo or a file on disk.
#
# For local/dev clusters only, copy this file, fill in real values, and
# apply it by hand:
#   cp k8s/app-secrets.example.yaml /tmp/app-secrets.local.yaml
#   # edit /tmp/app-secrets.local.yaml with real values
#   kubectl apply -f /tmp/app-secrets.local.yaml
#   rm /tmp/app-secrets.local.yaml
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: veerabank
type: Opaque
stringData:
  # --- Gmail (used by users-service to send OTP + login-notification emails) ---
  SMTP_USER: "your-sending-address@gmail.com"
  # A Gmail *app password* (Google Account -> Security -> 2-Step
  # Verification -> App passwords), NOT your normal account password.
  SMTP_APP_PASSWORD: "REPLACE_ME"

  # --- Groq (used by chatbot-service) ---
  GROQ_API_KEY: "REPLACE_ME"
