apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: veerabank
  labels:
    app: chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      serviceAccountName: backend-app
      containers:
        - name: chatbot
          # Replaced at deploy time with the real ECR image + tag (see deploy.yml)
          image: "<ECR_REPO_URL_CHATBOT>:latest"
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_MODEL
              value: "llama-3.3-70b-versatile"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_API_KEY
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
